name: Gerar APK Android

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Compilar APK Debug
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Android API 36
        run: sdkmanager "platform-tools" "platforms;android-36"

      - name: Liberar execução do Gradle
        run: chmod +x ./gradlew

      - name: Configurar cache do Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Executar testes
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Gerar APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: LimitadorVolume-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
